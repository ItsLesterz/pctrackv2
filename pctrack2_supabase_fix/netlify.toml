[build]
  command = "npm run build"
  publish = "public"
  functions = "netlify/functions"

[functions]
  external_node_modules = ["express", "pg", "bcryptjs", "cookie-session", "serverless-http", "@netlify/database"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
